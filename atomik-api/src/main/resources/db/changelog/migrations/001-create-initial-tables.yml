databaseChangeLog:
  - changeSet:
      id: 001-create-users-table
      author: guilhermefaglioni
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password_hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: preferred_currency
                  type: VARCHAR(10)
                  defaultValue: "BRL"
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

  - changeSet:
      id: 002-create-accounts-table
      author: guilhermefaglioni
      changes:
        - createTable:
            tableName: accounts
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_account_user
                    referencedTableName: users
                    referencedColumnNames: id
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(50) # CHECKING, SAVINGS, CASH, CREDIT_CARD
              - column:
                  name: currency
                  type: VARCHAR(10)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

  - changeSet:
      id: 003-create-categories-table
      author: guilhermefaglioni
      changes:
        - createTable:
            tableName: categories
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_category_user
                    referencedTableName: users
                    referencedColumnNames: id
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: icon
                  type: VARCHAR(50)
              - column:
                  name: color
                  type: VARCHAR(20)
              - column:
                  name: is_default
                  type: BOOLEAN
                  defaultValueBoolean: false

  - changeSet:
      id: 004-create-transactions-table
      author: guilhermefaglioni
      changes:
        - createTable:
            tableName: transactions
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_transaction_user
                    referencedTableName: users
                    referencedColumnNames: id
              - column:
                  name: category_id
                  type: UUID
                  constraints:
                    foreignKeyName: fk_transaction_category
                    referencedTableName: categories
                    referencedColumnNames: id
              - column:
                  name: source_account_id
                  type: UUID
                  constraints:
                    foreignKeyName: fk_transaction_source_acc
                    referencedTableName: accounts
                    referencedColumnNames: id
              - column:
                  name: destination_account_id
                  type: UUID
                  constraints:
                    foreignKeyName: fk_transaction_dest_acc
                    referencedTableName: accounts
                    referencedColumnNames: id
              - column:
                  name: amount
                  type: DECIMAL(19,4)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(255)
              - column:
                  name: date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(50) # REVENUE, EXPENSE, TRANSFER
              - column:
                  name: sync_status
                  type: VARCHAR(20) # PENDING, SYNCED
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

  - changeSet:
      id: 005-create-budgets-table
      author: guilhermefaglioni
      changes:
        - createTable:
            tableName: budgets
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_budget_user
                    referencedTableName: users
                    referencedColumnNames: id
              - column:
                  name: category_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_budget_category
                    referencedTableName: categories
                    referencedColumnNames: id
              - column:
                  name: limit_amount
                  type: DECIMAL(19,4)
                  constraints:
                    nullable: false
              - column:
                  name: month
                  type: INTEGER
              - column:
                  name: year
                  type: INTEGER

  - changeSet:
      id: 006-create-audit-logs-table
      author: guilhermefaglioni
      changes:
        - createTable:
            tableName: audit_logs
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: transaction_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_audit_transaction
                    referencedTableName: transactions
                    referencedColumnNames: id
              - column:
                  name: field_changed
                  type: VARCHAR(100)
              - column:
                  name: old_value
                  type: TEXT
              - column:
                  name: new_value
                  type: TEXT
              - column:
                  name: changed_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP